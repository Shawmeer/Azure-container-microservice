# =============================================================================
# Production-Grade CI/CD Pipeline for Azure Container Apps
# =============================================================================
# Features:
# - Azure authentication via Service Principal
# - Matrix strategy for parallel Docker builds
# - Terraform with plan/apply workflow
# - Environment support (dev/staging/prod)
# - Health checks and concurrency control
# =============================================================================

name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

# Concurrency: Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================================================
  # Job 1: Terraform - Infrastructure Provisioning
  # =============================================================================
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    outputs:
      acr_login_server: ${{ steps.terraform.outputs.acr_login_server }}
      postgres_host: ${{ steps.terraform.outputs.postgres_host }}
      frontend_url: ${{ steps.terraform.outputs.frontend_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # Azure Login
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
      
      # Terraform Setup
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      
      # Terraform: Format & Init
      - name: Terraform Format Check
        run: cd terraform && terraform fmt -check -recursive || true
      
      - name: Terraform Init
        working-directory: terraform
        run: terraform init
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      
      # Terraform: Plan
      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -var="client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
            -var="prefix=${{ secrets.PREFIX }}" \
            -var="location=${{ secrets.LOCATION }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="image_tag=${{ github.sha }}" \
            -var="create_container_apps=false" \
            -out=tfplan
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      
      # Terraform: Apply (only on main branch)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        working-directory: terraform
        run: |
          rm -f terraform/tfplan 2>/dev/null || true
          terraform apply -auto-approve \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -var="client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
            -var="prefix=${{ secrets.PREFIX }}" \
            -var="location=${{ secrets.LOCATION }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="image_tag=${{ github.sha }}" \
            -var="create_container_apps=false" || (
            echo "Apply failed, attempting state recovery with imports..."
            # Clean up corrupted state
            rm -f terraform/terraform.tfstate* 2>/dev/null || true
            
            terraform import \
              -input=false \
              -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
              -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
              -var="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
              -var="client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
              -var="prefix=${{ secrets.PREFIX }}" \
              -var="location=${{ secrets.LOCATION }}" \
              -var="db_password=${{ secrets.DB_PASSWORD }}" \
              -var="image_tag=${{ github.sha }}" \
              -var="create_container_apps=false" \
              azurerm_resource_group.main "/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.PREFIX }}-rg" || true
            terraform import \
              -input=false \
              -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
              -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
              -var="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
              -var="client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
              -var="prefix=${{ secrets.PREFIX }}" \
              -var="location=${{ secrets.LOCATION }}" \
              -var="db_password=${{ secrets.DB_PASSWORD }}" \
              -var="image_tag=${{ github.sha }}" \
              -var="create_container_apps=false" \
              azurerm_container_app_environment.main "/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.PREFIX }}-rg/providers/Microsoft.App/managedEnvironments/${{ secrets.PREFIX }}env" || true
            
            terraform import \
              -input=false \
              -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
              -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
              -var="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
              -var="client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
              -var="prefix=${{ secrets.PREFIX }}" \
              -var="location=${{ secrets.LOCATION }}" \
              -var="db_password=${{ secrets.DB_PASSWORD }}" \
              -var="image_tag=${{ github.sha }}" \
              -var="create_container_apps=false" \
              module.acr.azurerm_container_registry.main "/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.PREFIX }}-rg/providers/Microsoft.ContainerRegistry/registries/${{ secrets.REGISTRY_NAME }}" || true
            
            terraform import \
              -input=false \
              -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
              -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
              -var="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
              -var="client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
              -var="prefix=${{ secrets.PREFIX }}" \
              -var="location=${{ secrets.LOCATION }}" \
              -var="db_password=${{ secrets.DB_PASSWORD }}" \
              -var="image_tag=${{ github.sha }}" \
              -var="create_container_apps=false" \
              module.database.azurerm_postgresql_flexible_server.main "/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.PREFIX }}-rg/providers/Microsoft.DBforPostgreSQL/flexibleServers/${{ secrets.PREFIX }}dbsamir" || true
            
            terraform import \
              -input=false \
              -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
              -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
              -var="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
              -var="client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
              -var="prefix=${{ secrets.PREFIX }}" \
              -var="location=${{ secrets.LOCATION }}" \
              -var="db_password=${{ secrets.DB_PASSWORD }}" \
              -var="image_tag=${{ github.sha }}" \
              -var="create_container_apps=false" \
              module.database.azurerm_postgresql_flexible_server_database.main "/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.PREFIX }}-rg/providers/Microsoft.DBforPostgreSQL/flexibleServers/${{ secrets.PREFIX }}dbsamir/databases/appdb" || true
            
            echo "Running terraform refresh..."
            rm -f terraform/tfplan 2>/dev/null || true
            terraform refresh \
              -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
              -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
              -var="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
              -var="client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
              -var="prefix=${{ secrets.PREFIX }}" \
              -var="location=${{ secrets.LOCATION }}" \
              -var="db_password=${{ secrets.DB_PASSWORD }}" \
              -var="image_tag=${{ github.sha }}" \
              -var="create_container_apps=false" || true
            echo "Retrying terraform apply with fresh plan..."
            terraform plan \
              -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
              -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
              -var="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
              -var="client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
              -var="prefix=${{ secrets.PREFIX }}" \
              -var="location=${{ secrets.LOCATION }}" \
              -var="db_password=${{ secrets.DB_PASSWORD }}" \
              -var="image_tag=${{ github.sha }}" \
              -var="create_container_apps=false" \
              -out=tfplan || true
            
            terraform apply -auto-approve \
              -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
              -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
              -var="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
              -var="client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
              -var="prefix=${{ secrets.PREFIX }}" \
              -var="location=${{ secrets.LOCATION }}" \
              -var="db_password=${{ secrets.DB_PASSWORD }}" \
              -var="image_tag=${{ github.sha }}" \
              -var="create_container_apps=false"
          )
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      
      # Output Terraform outputs
      - name: Extract Outputs
        id: terraform
        if: always()
        working-directory: terraform
        run: |
          echo "acr_login_server=$(terraform output -raw acr_login_server 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "postgres_host=$(terraform output -raw postgres_host 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "frontend_url=$(terraform output -raw frontend_url 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

  # =============================================================================
  # Job 2: Build & Push Docker Images (Matrix Strategy)
  # =============================================================================
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    
    needs: terraform
    
    strategy:
      matrix:
        service:
          - user-service
          - product-service
          - api-gateway
          - frontend
        include:
          - service: user-service
            context: ./services/user-service
            port: 3001
          - service: product-service
            context: ./services/product-service
            port: 3002
          - service: api-gateway
            context: ./services/api-gateway
            port: 8080
          - service: frontend
            context: ./frontend
            port: 3000
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
      
      - name: Login to Azure Container Registry
        run: az acr login -n ${{ secrets.REGISTRY_NAME }}
      
      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ secrets.REGISTRY_NAME }}.azurecr.io/${{ matrix.service }}:${{ github.sha }}
            ${{ secrets.REGISTRY_NAME }}.azurecr.io/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PORT=${{ matrix.port }}

  # =============================================================================
  # Job 3: Deploy Container Apps (Azure CLI)
  # =============================================================================
  deploy-container-apps:
    name: Deploy Container Apps
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    needs: [terraform, build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Get ACR credentials
        id: acr
        run: |
          ACR_PASSWORD=$(az acr credential show -n ${{ secrets.REGISTRY_NAME }} --query passwords[0].value -o tsv)
          ACR_USERNAME=$(az acr credential show -n ${{ secrets.REGISTRY_NAME }} --query username -o tsv)
          echo "ACR_PASSWORD=$ACR_PASSWORD" >> $GITHUB_OUTPUT
          echo "ACR_USERNAME=$ACR_USERNAME" >> $GITHUB_OUTPUT

      - name: Get database hostname
        id: db
        run: |
          DB_HOST=$(az postgres flexible-server show -n ${{ secrets.PREFIX }}dbsamir -g ${{ secrets.PREFIX }}-rg --query fullyQualifiedDomainName -o tsv)
          echo "DB_HOST=$DB_HOST" >> $GITHUB_OUTPUT

      # User Service
      - name: Create or update user-service
        run: |
          if az containerapp show --name ${{ secrets.PREFIX }}-user-service --resource-group ${{ secrets.PREFIX }}-rg &>/dev/null; then
            az containerapp update \
              --name ${{ secrets.PREFIX }}-user-service \
              --resource-group ${{ secrets.PREFIX }}-rg \
              --registry-server ${{ secrets.REGISTRY_NAME }}.azurecr.io \
              --registry-username ${{ steps.acr.outputs.ACR_USERNAME }} \
              --registry-password ${{ steps.acr.outputs.ACR_PASSWORD }} \
              --image ${{ secrets.REGISTRY_NAME }}.azurecr.io/user-service:latest \
              --set-env-vars "PORT=3001" "DB_HOST=${{ steps.db.outputs.DB_HOST }}" "DB_PORT=5432" "DB_NAME=appdb" "DB_USER=appuser" "DB_PASSWORD=${{ secrets.DB_PASSWORD }}"
          else
            az containerapp create \
              --name ${{ secrets.PREFIX }}-user-service \
              --resource-group ${{ secrets.PREFIX }}-rg \
              --environment ${{ secrets.PREFIX }}env \
              --cpu 0.25 --memory 0.5Gi \
              --identity system \
              --min-replicas 0 \
              --max-replicas 1 \
              --registry-server ${{ secrets.REGISTRY_NAME }}.azurecr.io \
              --registry-username ${{ steps.acr.outputs.ACR_USERNAME }} \
              --registry-password ${{ steps.acr.outputs.ACR_PASSWORD }} \
              --image ${{ secrets.REGISTRY_NAME }}.azurecr.io/user-service:latest \
              --set-env-vars "PORT=3001" "DB_HOST=${{ steps.db.outputs.DB_HOST }}" "DB_PORT=5432" "DB_NAME=appdb" "DB_USER=appuser" "DB_PASSWORD=${{ secrets.DB_PASSWORD }}"
          fi

      # Product Service
      - name: Create or update product-service
        run: |
          if az containerapp show --name ${{ secrets.PREFIX }}-product-service --resource-group ${{ secrets.PREFIX }}-rg &>/dev/null; then
            az containerapp update \
              --name ${{ secrets.PREFIX }}-product-service \
              --resource-group ${{ secrets.PREFIX }}-rg \
              --registry-server ${{ secrets.REGISTRY_NAME }}.azurecr.io \
              --registry-username ${{ steps.acr.outputs.ACR_USERNAME }} \
              --registry-password ${{ steps.acr.outputs.ACR_PASSWORD }} \
              --image ${{ secrets.REGISTRY_NAME }}.azurecr.io/product-service:latest \
              --set-env-vars "PORT=3002" "DB_HOST=${{ steps.db.outputs.DB_HOST }}" "DB_PORT=5432" "DB_NAME=appdb" "DB_USER=appuser" "DB_PASSWORD=${{ secrets.DB_PASSWORD }}"
          else
            az containerapp create \
              --name ${{ secrets.PREFIX }}-product-service \
              --resource-group ${{ secrets.PREFIX }}-rg \
              --environment ${{ secrets.PREFIX }}env \
              --cpu 0.25 --memory 0.5Gi \
              --identity system \
              --min-replicas 0 \
              --max-replicas 1 \
              --registry-server ${{ secrets.REGISTRY_NAME }}.azurecr.io \
              --registry-username ${{ steps.acr.outputs.ACR_USERNAME }} \
              --registry-password ${{ steps.acr.outputs.ACR_PASSWORD }} \
              --image ${{ secrets.REGISTRY_NAME }}.azurecr.io/product-service:latest \
              --set-env-vars "PORT=3002" "DB_HOST=${{ steps.db.outputs.DB_HOST }}" "DB_PORT=5432" "DB_NAME=appdb" "DB_USER=appuser" "DB_PASSWORD=${{ secrets.DB_PASSWORD }}"
          fi

      # API Gateway
      - name: Create or update api-gateway
        run: |
          if az containerapp show --name ${{ secrets.PREFIX }}-api-gateway --resource-group ${{ secrets.PREFIX }}-rg &>/dev/null; then
            az containerapp update \
              --name ${{ secrets.PREFIX }}-api-gateway \
              --resource-group ${{ secrets.PREFIX }}-rg \
              --registry-server ${{ secrets.REGISTRY_NAME }}.azurecr.io \
              --registry-username ${{ steps.acr.outputs.ACR_USERNAME }} \
              --registry-password ${{ steps.acr.outputs.ACR_PASSWORD }} \
              --image ${{ secrets.REGISTRY_NAME }}.azurecr.io/api-gateway:latest \
              --set-env-vars "PORT=8080" "USER_SERVICE_URL=http://${{ secrets.PREFIX }}-user-service.internal.${{ secrets.PREFIX }}env" "PRODUCT_SERVICE_URL=http://${{ secrets.PREFIX }}-product-service.internal.${{ secrets.PREFIX }}env"
          else
            az containerapp create \
              --name ${{ secrets.PREFIX }}-api-gateway \
              --resource-group ${{ secrets.PREFIX }}-rg \
              --environment ${{ secrets.PREFIX }}env \
              --cpu 0.25 --memory 0.5Gi \
              --identity system \
              --min-replicas 0 \
              --max-replicas 1 \
              --registry-server ${{ secrets.REGISTRY_NAME }}.azurecr.io \
              --registry-username ${{ steps.acr.outputs.ACR_USERNAME }} \
              --registry-password ${{ steps.acr.outputs.ACR_PASSWORD }} \
              --image ${{ secrets.REGISTRY_NAME }}.azurecr.io/api-gateway:latest \
              --set-env-vars "PORT=8080" "USER_SERVICE_URL=http://${{ secrets.PREFIX }}-user-service.internal.${{ secrets.PREFIX }}env" "PRODUCT_SERVICE_URL=http://${{ secrets.PREFIX }}-product-service.internal.${{ secrets.PREFIX }}env"
          fi

      # Frontend
      - name: Create or update frontend
        run: |
          if az containerapp show --name ${{ secrets.PREFIX }}-frontend --resource-group ${{ secrets.PREFIX }}-rg &>/dev/null; then
            az containerapp update \
              --name ${{ secrets.PREFIX }}-frontend \
              --resource-group ${{ secrets.PREFIX }}-rg \
              --registry-server ${{ secrets.REGISTRY_NAME }}.azurecr.io \
              --registry-username ${{ steps.acr.outputs.ACR_USERNAME }} \
              --registry-password ${{ steps.acr.outputs.ACR_PASSWORD }} \
              --image ${{ secrets.REGISTRY_NAME }}.azurecr.io/frontend:latest \
              --set-env-vars "PORT=3000" "API_GATEWAY_URL=https://${{ secrets.PREFIX }}-api-gateway.${{ secrets.PREFIX }}env.azurecontainerapps.io"
          else
            az containerapp create \
              --name ${{ secrets.PREFIX }}-frontend \
              --resource-group ${{ secrets.PREFIX }}-rg \
              --environment ${{ secrets.PREFIX }}env \
              --cpu 0.25 --memory 0.5Gi \
              --identity system \
              --min-replicas 0 \
              --max-replicas 1 \
              --registry-server ${{ secrets.REGISTRY_NAME }}.azurecr.io \
              --registry-username ${{ steps.acr.outputs.ACR_USERNAME }} \
              --registry-password ${{ steps.acr.outputs.ACR_PASSWORD }} \
              --image ${{ secrets.REGISTRY_NAME }}.azurecr.io/frontend:latest \
              --set-env-vars "PORT=3000" "API_GATEWAY_URL=https://${{ secrets.PREFIX }}-api-gateway.${{ secrets.PREFIX }}env.azurecontainerapps.io"
            az containerapp ingress enable --name ${{ secrets.PREFIX }}-frontend --resource-group ${{ secrets.PREFIX }}-rg --type external --target-port 3000 --transport auto
          fi
      
      # Wait for container apps to fully initialize
      - name: Wait for container apps
        run: sleep 10

      # Grant ACR Pull Role (as fallback for managed identity-based access)
      - name: Grant ACR Pull Role
        run: |
          for service in user-service product-service api-gateway frontend; do
            IDENTITY_ID=$(az containerapp show \
              --name ${{ secrets.PREFIX }}-$service \
              --resource-group ${{ secrets.PREFIX }}-rg \
              --query identity.principalId \
              -o tsv 2>/dev/null) || continue

            if [ -n "$IDENTITY_ID" ]; then
              # Check if role already assigned
              existing=$(az role assignment list \
                --assignee "$IDENTITY_ID" \
                --scope /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.PREFIX }}-rg/providers/Microsoft.ContainerRegistry/registries/${{ secrets.REGISTRY_NAME }} \
                --role "AcrPull" 2>/dev/null | jq length)

              if [ "$existing" -eq 0 ]; then
                echo "Granting AcrPull to $service (identity: $IDENTITY_ID)"
                az role assignment create \
                  --assignee "$IDENTITY_ID" \
                  --scope /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.PREFIX }}-rg/providers/Microsoft.ContainerRegistry/registries/${{ secrets.REGISTRY_NAME }} \
                  --role "AcrPull" 2>/dev/null || true
              fi
            fi
          done
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # =============================================================================
  # Job 4: Health Check (Post-Deployment)
  # =============================================================================
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    needs: [terraform, build, deploy-container-apps]
    
    steps:
      - name: Wait for deployment
        run: sleep 30
      
      - name: Check Frontend Health
        id: frontend_health
        run: |
          URL="${{ needs.terraform.outputs.frontend_url }}"
          echo "Checking: $URL"
          
          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $HTTP_CODE"
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Frontend is healthy!"
              exit 0
            fi
            
            sleep 10
          done
          
          echo "Frontend health check failed!"
          exit 1

  # =============================================================================
  # Job 4: Notify
  # =============================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    if: always()
    
    needs: [terraform, build, deploy-container-apps, health-check]
    
    steps:
      - name: Success Notification
        if: needs.health-check.result == 'success'
        run: |
          echo "Deployment successful!"
          echo "Frontend: ${{ needs.terraform.outputs.frontend_url }}"
      
      - name: Failure Notification
        if: needs.health-check.result == 'failure'
        run: echo "Deployment failed! Check workflow logs."
