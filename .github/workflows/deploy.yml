# =============================================================================
# Production-Grade CI/CD Pipeline for Azure Container Apps
# =============================================================================
# Features:
# - Azure authentication via Service Principal
# - Matrix strategy for parallel Docker builds
# - Terraform with plan/apply workflow
# - Environment support (dev/staging/prod)
# - Health checks and concurrency control
# =============================================================================

name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

# Concurrency: Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================================================
  # Job 1: Terraform - Infrastructure Provisioning
  # =============================================================================
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    outputs:
      acr_login_server: ${{ steps.terraform.outputs.acr_login_server }}
      postgres_host: ${{ steps.terraform.outputs.postgres_host }}
      frontend_url: ${{ steps.terraform.outputs.frontend_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # Azure Login
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
      
      # Terraform Setup
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      
      # Terraform: Format & Init
      - name: Terraform Format Check
        run: cd terraform && terraform fmt -check -recursive
        continue-on-error: true
      
      - name: Terraform Init
        working-directory: terraform
        run: terraform init
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      
      # Terraform: Plan
      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -var="client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
            -var="prefix=${{ secrets.PREFIX }}" \
            -var="location=${{ secrets.LOCATION }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="image_tag=${{ github.sha }}" \
            -var="create_container_apps=true" \
            -out=tfplan
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      
      # Terraform: Apply (only on main branch)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        working-directory: terraform
        run: terraform apply -auto-approve tfplan
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      
      # Output Terraform outputs
      - name: Extract Outputs
        id: terraform
        if: always()
        working-directory: terraform
        run: |
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> $GITHUB_OUTPUT
          echo "postgres_host=$(terraform output -raw postgres_host)" >> $GITHUB_OUTPUT
          echo "frontend_url=$(terraform output -raw frontend_url)" >> $GITHUB_OUTPUT

  # =============================================================================
  # Job 2: Build & Push Docker Images (Matrix Strategy)
  # =============================================================================
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    
    needs: terraform
    
    strategy:
      matrix:
        service:
          - user-service
          - product-service
          - api-gateway
          - frontend
        include:
          - service: user-service
            context: ./services/user-service
            port: 3001
          - service: product-service
            context: ./services/product-service
            port: 3002
          - service: api-gateway
            context: ./services/api-gateway
            port: 8080
          - service: frontend
            context: ./frontend
            port: 3000
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
      
      - name: Login to Azure Container Registry
        run: az acr login -n ${{ secrets.REGISTRY_NAME }}
      
      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ secrets.REGISTRY_NAME }}.azurecr.io/${{ matrix.service }}:${{ github.sha }}
            ${{ secrets.REGISTRY_NAME }}.azurecr.io/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PORT=${{ matrix.port }}

  # =============================================================================
  # Job 3: Health Check (Post-Deployment)
  # =============================================================================
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    needs: [terraform, build]
    
    steps:
      - name: Wait for deployment
        run: sleep 30
      
      - name: Check Frontend Health
        id: frontend_health
        run: |
          URL="${{ needs.terraform.outputs.frontend_url }}"
          echo "Checking: $URL"
          
          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $HTTP_CODE"
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Frontend is healthy!"
              exit 0
            fi
            
            sleep 10
          done
          
          echo "Frontend health check failed!"
          exit 1

  # =============================================================================
  # Job 4: Notify
  # =============================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    if: always()
    
    needs: [terraform, build, health-check]
    
    steps:
      - name: Success Notification
        if: needs.health-check.result == 'success'
        run: |
          echo "Deployment successful!"
          echo "Frontend: ${{ needs.terraform.outputs.frontend_url }}"
      
      - name: Failure Notification
        if: needs.health-check.result == 'failure'
        run: echo "Deployment failed! Check workflow logs."
